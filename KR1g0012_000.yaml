  text: 欽定四庫全書經部七
  hash: sha256:9b3ad78a068d370ed0a22a5815795ceda97dda23eb14dcbabe81faeb74005c0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0012_WYG_000-1a, image: WYG0184/WYG0184-0123a.png}
body:
  text: 明本排字九經直音五經總義類提要臣等謹按明本排字九經直音二卷不著撰人名氏書中春秋傳素王二字下引宋真宗宣聖贊但稱真宗不稱宋又稱御製則為宋人所著可知卷首題曰明本者宋時刋板多舉其地之首一字如建本杭本之類此蓋明州所刋本即今寧波府也末題歲次丁亥梅隱書堂新刋不著年號考丁亥為元世祖至元二十四年是元初刋本矣其書不用反切而用直音頗染鄉孰陋習然所音俱根據經典釋文猶為近古釋文一字數音者皆並存之如金縢辟字下云孔音闢法也説文音必鄭音辟大誥賁字下云音墳王讀為賁卦之賁禮內則接以太牢接字下云鄭音捷王杜並以為接待祭法相近於坎壇坎字下云注作禳祈孔叢子以為祖迎祭義爓字下云徐亷反古音燖周禮太宰圃字下云布古反音布牧字下云徐音目劉音茂頒字下云鄭音班徐音墳籩人茒字下云茒音卯又音栁遺人下云遺音位劉音遂乃與卷首序遺人音推異如此者不可枚舉固非後來坊本直音以意屬讀惟趨便捷者比也惟禮記敖不可長釋文敖依注五報反慢也王肅五高反遨遊也長竹丈反盧植馬融王肅並直亡反此書云敖王音平則釋文所云王五高反也而於長字下又注云長張上又平則又兼用鄭注竹丈反一句之內於鄭注半從半違遂使敖字長字音義兩不相應又周禮太宰斿貢下云斿音留燕遊也今考鄭注斿讀如燕遊之遊此書既用鄭義則斿當作以周反其作良周反音留者乃春秋傳鞶厲遊纓之遊更自相矛盾又月令審端徑術下云術注作遂方曰徑道之小術道之末則如字是今考學記術有序注術當為遂水經注引學記術有序作遂有序春秋文公十二年秦伯使術來聘公羊傳漢書五行志術並作遂是古字術遂本通此書反信方氏之曲説殊為未協又中庸一戎衣下云書武成作如字者是注讀為殷者無據今考古依字作㐆從反身殷字從此故讀殷為㐆音與衣同白虎通曰衣之為言隱也所以隱身也則衣隱音近楚詞新浴必振衣與汶塵合韻則衣殷二字音通是書以為無據亦為失考然核其大致則多能決擇是非如於三禮雖多守方慤注而於祭法幽宗注讀如禜方慤宗作如字則兼存鄭義又書武成識字下云陸無音漢翟酺疏引此作恭則補苴闕遺亦頗能有所考據又檀弓卜人師扶右下云卜讀為如字者非考鄭注卜當為僕聲之誤也僕人射人皆平時贊正君服位者若卜人則於義無取此書不用釋文所載前儒之説最當又周禮醯人菭字下云音治又音殆今考釋文云又丈之反未知所出不知説文菭水衣本作菭以草治聲水衣之菭既以治為聲則丈之反乃為菭之古音矣故菭草名作澄之切可以相證是書用丈之切為本音而以代為又音較之釋文以丈之切為無出考核尤精且釋文所載皆唐以前音而此書則兼取宋儒如於詩中庸論語孟子則多採朱子於易則兼採程朱於禮則多採方慤其他經引胡瑗司馬光音讀尤多與陸氏之書尤足相續在宋人經書音釋中最為妥善若九經前後失次則當為坊刻之誤既無關大旨固無庸深論矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
