為去邪耶鉏鋤質致女汝飲去淄緇厭掩又葉勝升又剰炊吹射石中去繇由朐渠匕比亢抗晳析鬒軫下去刜弗斷短鑋磬又輕呼去乗去禇主又紵雚丸又貫塞去適的長張上好去而惡如字援院賂路召邵般班難去彘治間去頽徒回反施去辟僻難去頿髭共恭間去惡去弔如字又的厭平貫慣盪唐上㡳㫖適的立少下去間去焉父下甫彗遂禳瀼祇之説悦施去區謳施如字歛去女汝少上已之上以家施下去滔叨令去二十七年郤宛隙寃莠有麇羣戌恤鱄專索色堀窟鈹披刺七説悦比鼻惡去飲去好去幾祈群帥去爇軟去菅奸秆古但反炮庖呼去説脱且知上徂難去幾平焉煙知去其朝下潮重上又平二十八年个箇惡如字又去立辟下闢為去憖銀去食我上似鮮上少去貊陌黰真上取如字又娶惏藍饜平纇雷去羿詣共恭女汝强上長張上姒似喪去知徐上智鱄專又附去行去度入莫陌又如字長張上比如字施以䜴反鬷宗使之上去以上下上射雉上石能射如字女汝夫扶颺揚幾祈今汝女下同毋无墮隳斷煆閻炎女汝朝潮比必利将軍食下似屬燭厭平又去二十九年祇支數所鄻輦賈古從去乗去塹七見切為去犢獨食似裹果見現智知畜朂豢患飂溜好去耆􅄝飲食並去鬷宗夏上擾澆乗剰食似下同累上更庚醢海夫扶泯敏坻㫖又底湮因句勾芒忘作忙非蓐辱姤媾見現少去皥浩曰重下平共恭以上下上與予三十年頃傾子蟜下矯共恭禦御好去邑之閒閑下同紼弗㡳㫖女汝省眚監平好去重去喪去焉煙斷短伍貟下云惡去適的任壬肄移去亟欺去罷皮三十一年躒厯適厯上的跣先上費祕知伯上去好去夫人上扶與予難去乗剰衆從下去稽啓又如字懲澄難去徼澆冒墨又如字數所臝羅上謫責三十二年蝥矛施去與預紓舒焉煙傒兮上渝俞揣丁累反又吹上度入量良屬燭帥去琥虎妃耦上配乗平始震如字又音身聞問費祕適的定公元年煬羊去屬燭過戈裁在又再仲幾下機邳皮虺毁相去焉煙亟欺去中去得見下現從去壞怪隤頽闞口暫反駕加鵝俄惡去焉煙二年兩觀下貫為去射亦敲去三年射亦乗剰好去肅如字又所六反爽霜駿馬名從去飲去相去夫人上扶償常去共恭沈鴆質致四年姓生卷權又倦鼬由嘖在責切又責祝佗下駝從去共恭徼澆𨽻利竟境祓弗又廢以從如字又去好去長張上相去分去封父下甫繁弱如字勺杓虚墟綪茜七見反茷歩貝反又吠繁氏婆相土上去疆姜周索桑入洗先上冷上分去惎忌間去蔡蔡上索達反下如字改行下去之昭如字説悦乃長張上召陵上邵臨去語去怙户敖傲復去貟云噽丕上乾䖍質致隧遂轅袁軛厄惡去好上而陳下陣别邊入難去陳于上陣夫槩上扶乗廣並去芈米雎狙鍼針句卑上勾剄景裹果中去鄖云從去非知下智女汝施衣去辟僻難去鑪炉見現復服莽忙上分去勺杓又灼為去五年亟急璵余璠煩歛去為去費祕勞去射石又如字暴蓬入闉因與于又如字罷皮葉渉從如字又去藐邈又眇歜觸亹尾帑奴前惡如字舎捨又赦為去逺去妻去脾皮洩泄六年為去舎赦難去質致强上鄀若使去説悦溷侯慁侯困二反飲去楯盾賈加使去五父下甫蕕由又去辟避七年鹹咸墮隳難去女汝黨掌八年傳如字射石中去頰兼入呼去殿顛去好去使去大行下杭濡儒褐曷苫店鄟專渉沱下駝焉煙歃杉入捘最捥烏貫反詬候質致難去朝潮更庚鈹披盾純上殿顛上咋乍射石中去説悦舎赦從去辨舎上遍下如字讙歡歂遄九年向尚衰七雷反舎捨菑灾罷皮焉煙鍥挈葱怱又如字霤溜下去難去靳巾去取娶禇攄去帥去禚酌晳析幘䇿又責貍釐貺况推如字又退平十年鄆運讙欠郈后彄苦侯反祝其並如字相去偪逼遽詎辟闢又避竟境還旋共恭犧羲又莎秕鄙稗排去夫扶其已下以邯寒鄲丹􅑒尖稙殖又植藐邈射石為之上去兇凶又上紓舒偪逼呼去殿顛去數所嬖庇蘧渠魋頽抶初乙反頗坡竟境為去迋求徃反又召况反屬燭所惡下去十一年叔還下旋十二年彄摳墮隳費秘殿顛去申句下劬頎祈障如字又章子偽並如字或偽作十三年葭加比毗射石又如字朝如字郹扄入邴柄又丙傳轉又如字侯乗下去廣去比庇為去又如字從去説脱我説如字知文上智相惡如字又去鰌秋難去鮮上與預惡去十四年牂臧檇醉比蒲上毗惡去難去與去焉煙莫暮背佩好去句踐上勾陳陣三行下杭屬燭又注剄景将去陘刑夫扶差义唯上為去婁樓豬張魚反艾五盖反豭加戯希朝潮少君上去余說如字紓舒露路十五年鼷兮蒢除朝潮而中下去遽渠拏女居反又拿祔附哀公元年裁在又再夫屯並如字夫兵也屯守也夫椒上扶檇醉楯盾㑹檜稽圭種上嚭皮上貟云去上有過下戈澆曉去又敖斟針灌貫鄩尋相去緡民娠震又真竇豆少去惎忌妻去姚遥綸倫女如字又汝艾五蓋反諜牒杼紓豷希去過戈復服施去長張上求伯如字又霸復服芥界艾刈暴逄入莽忙上闔合廬閭不重下平彤同鏤陋觀貫費如字菑灾癘利共供分芬卒尊入乗剰與預罷皮嬙牆好去觀樂下洛夫扶也已下以二年漷轟入又郭句鈎繹亦絞狡立女下汝祇支絻問般班先陳下陣契如字又挈艾刈詬姤又苟志父下甫絞狡縊翳屬燭辟擘樸朴郵由乗平麇君又羣上店苫在難下去佚逸筋斤中去蠭蜂復去傁叟有知下智艾瓦蓋反尨厖般班殿顛上射石弢叨嘔謳上郵尤靷引去乗去以説如字三年庀披上女汝共恭校效乗去轄鎋濟去又上鬱攸聿由悛銓父甫槐懐瀋沉上還環又患共劉上恭惡去四年承懲射石鍇楷又皆中去盱吁眅攀上又攀葉攝凾咸郢影單善雒洛莬徒好惡並去少去為去降杭墮隳任壬鄗壑又烘入畤止五年惡去夫扶好去鬻育姒似荼舒茶徒三音長張上惡去間閑又去疢勅覲反樂洛黔鈐人琴與預惡去解懈鮮上六年柤查父甫乗去偪逼需須又弱儒當考難去乗去舎捨禜詠夭上焉烟雎狙漳章行如字又去上乗下去闞瞰壬平差所宜反點平又如字女汝背佩拘俱説悦句鉤竇豆難去少去長張上夫扶駘苔殳殊冒帽淳純七年長張上共恭斷短臝羅上背佩焉煙惡去不樂下洛柝托掠亮乗去馮平背佩辟僻好去説之悦下同背佩奸干䢴干八年讙歡闡如字過戈殿顛去詬后為去夫人上扶惡去又如字覆福率誰去洩泄洩率所類反竟境鄫繒漚謳去菅姦道導澹待甘反好去舎赦泗四屬燭踊勇卒如字終也與預也已下以易子如字析昔骸諧㸑竄輕去少上載如字又妻去魴房栫千去女汝麇羣上九年瑗院雍丘上賸盈去舎捨䢴寒儆景十年鄎息犂黎轅袁十一年頗如字又坡㔻丕守狩從如字又去屬蜀朝潮俟仕黨氏上掌强上共供乗去邴柄又丙周父下甫卒尊入瓘貫殿顛去惡賢上烏諜牒語去僮同錡蟻乗去殤啇咺𤣥上糗起九反腵鍜又丁亂反脯甫為去嬴盈含去鈹披褽尉纁勲組祖衷中使上朝潮豢患夫扶共恭使去屬燭鏤力俱反乂樓檟假而妻下去姞其乙其吉反鄖云飲去簋軌度鐸難去卒曰如字施去歛去冐墨又如字厭平十二年橐拓又託與弔上預絻問要平且狙摽敷消反普交反瘈吉世反噬逝舎赦餼希去難去墮隳説悦舎赦又捨隙輕入彌如字又上頃如字暢帳嵒岩戈如字錫陽又如字十三年孛佩夏上區謳郜告又谷為虛如字為墟非泓烏𢎞反屬燭惡其上去剄景長張上旰汗輕去使去以見下現六人從下去恭共祇之橤蕋盛成又如字褐曷之父如字又甫睨詣麤粗呼去勝去十四年麟鄰邾射下亦句鉤繹亦要腰闞苦暫反遺如字又去潘芳袁反沐木長而張上僂縷説悦立女下汝逺如字又去舎去乗去幄握需須屬燭弇奄又淹耏而雍去鞌安余長張上惡去乘去麋眉所難下去共恭頎祈祇之質致乃舎赦又捨璜黄惡之上去阬亢又剛曰齊下上洩泄圉語從去弗内如字又納􅃝但免問共恭十五年汭芮勞去潦老乃廩下稟芋喻備使下去使人上去隕隊下墜共恭積漬又如字内之如字又納瓘貫過戈斵喪下去惡去贛貢背佩喪去焉煙冠如字又貫濟上禚闕取娶悝恢豎樹長張去使之去又如字無與下予舎赦而乗下去豭加强上炙蔗召邵乗去難去辟避使者上四焉煙燔煩舎捨又如字盂于黶黯斷短云上瞞莫干反禇史吕反十六年誄壘旻民弔釣又的憖銀去屏丙煢瓊尼父下甫飲去祏石公為如字人名射石逺去從去辟華上避下去葉攝竟境女汝長張上見現説悦不為下去抉越葉攝饜厭去以幾下冀艾乂亦夫如字又扶長張上頯夔沈審比鼻强上十七年陳陣句鉤御禦難去㭬􅅣相去率所類反鄀若舎捨觀貫繇由竀勅呈反衡横方旁般班鄄絹墜墜髢大計反酁讒十八年鄾憂薳蕋二十年為去説如字又悦質至間去共恭難去句勾二十一年傳轉比庇二十二年甬勇二十三年與予繁磐户板反御禦守狩使去二十四年使去徼澆焉烟躗垂去餼希去妻去二十五年禇主許角斷短乗剰帑奴飲去從去又如字鄄絹間去泠伶卒尊入好去道導内如字又納重平又去祝如字又去惡去飲去樂洛二十六年茷吠幾機相去惡去連如字又輦畫獲首去咮晝别邊入使去孫遜二十七年駘苔夫扶屬燭涿琢難去女汝毋无衣去阪反輕去以壓壓間去孫于上遜桔賢入柣迭入酅兮惡而如字惎忌喪去明本排字九經直音卷下
