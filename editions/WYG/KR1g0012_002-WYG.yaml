  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0012_WYG_002-1a, image: WYG0184/WYG0184-0176a.png}
body:
  text: 明本排字九經直音卷下禮記曲禮上毋音无其字從女内加一畫與父母字不同儼嚴上思如字徐去敖傲王音平長張上又平從縱樂洛又岳狎匣難去很痕上勝去聲分去聲若夫扶鄭作丈夫之夫非下同齊齋使去䟽踈嫌户恬别邊入說税費非去踰余不好去善行去下同取於人去皇如字取人如字宦患朝潮涖利禱倒祠詞樽尊上鸚鶯鵡武離去猩生麀憂别邊入施去販番去好去攝占入冠貫强如字艾五蓋耆其傳平耄毛去悼桃去期其頥怡乗平長張上操平凊情上省星上潦聊弟去行去告谷恒常長張上奥烏報食似槩溉訾紫又貲闇暗不純凖下同毋无誑九况不衣去聲長張上提題攜畦户圭切奉捧辟僻咡餌掩奄從去下同拱上長張上而上上下同鄉向呼去舍去屨句聞去又平下同奉捧扃冏闔盍踖迹摳口平隅愚唯委諾囊入闑言入閾域拾渉級急以上上下同翔祥肱觥跪葵上凡為去聲長張去糞分去帚周上箕基袂眉去拘勾又俱鄉向扱吸奉捧橋衡上去方曰如橋之髙衡之平鄉向袵壬上下同趾止函含徹轍重平毋无怍昨去齊資撥般入蹶圭去又厥盡後津上儳杉去勦抄又初殺反唯而上委不見現跋魃叱嗔入唾他去撰船上蚤早莫暮更平少上間閑復讀如孟子復於王之復屏秉噭呌應去倨據跛賁又波上髢替免如字袒但褰愆不上上解皆上跪葵上屏秉椸移枷架櫛臻入漱刺平梱閫齊齊别邊入取妻取音娶不取如字見現賀取娶某子使某牡筋斤異長張上冠貫笄雞殽爻胾緇去食似膾檜炙柘處上醯熈醤将去㳿曵漿将脯甫朐劬執食如字飯反辯陸音遍方云食殽以循其序當如字饋匱摶團歠川入咤查去齧言入箸除去嚃陸它答反絮徐去剌青入歠川入醢海亨烹窶渠上濡如乾干嘬柴去炙蔗卒遵入齊虀相去少去釂焦去核翮漑槩餕俊梜莢又甲為去副陸音劈方如字絺癡華如字綌去逆累羅上方解為積累之累疐帝齕忽冠如字又貫惰平矧申上詈利復服潦老鼈邊入佛弗綏雖胄宙操平袂眉去契苦計量亮又良齊虀遺去筋斤弛豕弣撫帨稅還旋辟辟上闢下避鄉嚮鐏村去又纂矛謀㦸棘鐓隊又鍜繢回去掬菊苞包苴蛆簞丹笥嗣使去凡為去使去下同已以使人如字朝潮使者去識如字又志行去下之去乗去齊齋不樂岳不音洛與下經不樂字不同居喪桑瘠籍阼祚創瘡下同痬羊復初服勝升衰催處上生與方云讀如不與祭之與弔喪桑賻附費非去遺去舍赦壟隴紼弗柩舊臨如字舊去舂書容反不相去殯賔去辟避潦老胄宙下之去不下去不上上綏緌則載戴下同方如字鳶縁騎去摯至貅休繕勁度渡壘累筴䇿不偏篇逮代竟境假加上筮世襲習筴䇿令去猶去與去踐王如字注為善切非軨靈上上乗去轡秘并併攘辟上攘或音讓下音避車驅區又去騶驟又趨拘勾又俱立乗去不上上下去御迓蓌挫又詐乗君平乗車去竒居宜切欬開去巂攜轂谷彗遂䘏勿上蘇入下音没方並如字齊齋下去朝潮蹙促又足曲禮下奉捧提題上上綏妥又蓷曵衣去踵終上折氊入藉且去裼昔襲習姪耋又秩娣弟相去長張上朝潮已孤以更庚為去諡示復服重平袗軫絺梯綌輕入苞飄上扱慙入厭葉衰催廐救造上養去粥育衣去竟境鄉向縁去鞮低簚覔乗平髦毛蚤爪鬋剪說如字見現勞去還旋辟闢非見現見於現麛迷縣𤣥不樂岳徹縣𤣥告谷勞之去朝潮畛軫復服假遐嬪賔六大泰之長張上擯賔上當依上而見現宁貯郤輕入涖利見天上現使於去上同適的濟上蹌蹡僬椒去使者去號毫儗擬長張上數地上所車數去數畜上音所下音救徧遍索生入鬛獵豚屯腯突翰汗疏疎脯甫槀考鮮仙脡挺滌亭入薌香合如字又音閤萁姬粢咨韭久鹹咸鹺瑳量去柩舊降平又去漬咨去妣比辟闢折舌不上上袷刼綏妥敖五報肄異朝潮摯至鬯悵匹木纓嬰椇矩榛臻埽去灑上又去檀弓上免問舍捨居姬腯屯上又循夫扶養去下同合葬如字又閤居姬喪桑汚烏伋急稽啓顙桑上頽徒回切頎懇又祈識志應去三去又如字泫𤣥上涕體使去醢海覆封入殯賔去一朝昭不樂洛又岳子少去五父甫慎寅去聊鄒曼萬父甫相去緌㽔堲唧又稷翣衫入長張上殤傷劔去乗平驪離翰汗又寒騵原騂辛齊咨饘旃縿綃幕莫又覓重平蓋盍下同驪離子少去難去稽啓共恭朝昭莫暮已以夫扶乗邱去縣𤣥賁奔父甫隊墜圉語誄壘睆環上簀責與余瞿句呼吁革京入斃弊瞿句慨開去廓擴邾誅婁閭復服陘刑髽查臺胡鮐台韜縚爾毋无從總扈户榛臻笄雞長尺去禫覃上縣𤣥樂岳比庇屨句組祖厭壓姊子除如字比及畀樂樂上岳下洛首去期基誰與余嘻僖梧吾爨七亂語去幾機與余倡去踊勇縮速縫逢又奉衡横漿将跂噐稅兊使去乗去惡乎上烏則已以夫扶見我上現為爾去喪其子喪下喪爾親喪爾子同喪其明去下喪明喪爾明同女汝下與女疑女女何同洙姝泗四罪與余離去索桑入夫扶齊齋見齒上現衰催不當去齊咨說恱驂參賻附已以重去鄉向涕上惡去夫扶識志饋匱蚤早消摇逍遥頽徒回萎痿放上阼祚夾甲夫扶翣衫入披卑去綢韜又紬旐上褚上仇求苫店枕去朝潮銜咸使去從父去魁恢絰田入易去填池注音奠徐盧王並如字推如字又吐回反從去與余夫扶飯反斂去襲習裼昔夫夫上扶下如字􅃝但見現予與和之音禾又去為之去下同衰催適的復服涕去洟夷幾譏中去冠貫􅋼留去竈躁綴輟又如字躐獵粥育蘧渠從去樂洛下同瑗院笄入夫扶踊勇歛去卜人僕讀為如字非從去二夫扶相為下去爨七亂反緦思縱總折新補徙兮切遽巨騷素刀反逺之上去不知下智味沫斵琢竽于不和下去簨笋虡巨問喪上或作聞下去下同有為下去靡如字為桓去下為敬叔同朝潮繆木縣𤣥竟境焉烟夫扶下同叔木音式樹反又音朱齊咨衰催蓋盍縣𤣥為孟上去夫扶易去衰催繐嵗相去沽古易之亦稱去亡无下同惡烏齊去又如字毋无歛如字還旋縣𤣥封窆賁奔汰太醯熈醢海甕翁去賵奉遺去又如字革京入衎看去燕烏田舍赦坊防覆福鬛獵重平􅋼留椑闢楔屑綴輟又如字飯反也與余朝凋縓取絹反緣去要平絇劬瑱奠衡横袪墟裼昔重平杝移䌶緇為之去菆徂九輴椿别邊入誄累相去父甫厭入惡去縞藳禫大感反帟亦檀弓下適的長上乗去之長上朝潮蟜矯説脱見現樂岳引去壙曠紼弗舍赦臨如字又去適的袒但免問使去又如字與哉上余悼桃去穀去又谷為之去下同重平恒常喪亦去下同說如字與預稽啓顙桑上顯軒去仁夫扶下同逺去復服别邊入已以識志重平下同綴輟又如字齊齋辟僻踊勇去上冔許歠川入為去食似養去封窆下同慤康入首去舍釋離去祔附比􅂌末有上秣茢列惡去朝潮下同殉旬去俑勇為去與余膝辛入隊墜毋无為去瘠籍毋无疑夫扶食食上如字下音似歛去下同與余也已以遺去乗去焉烟相去鄉向噫伊毋无斯賜沾覘矣夫扶䙝先入見現知夫扶下同踊勇去上陶逃咏詠猶遥辟僻惡去倍佩絞户交反蔞柳翣衫入為去下同惡去脯甫醢海食似舍捨訾咨還旋竟境嚭丕上使去夫扶差初佳反是夫如字盍合厲與余下同慨開去讙歡知智蕢蒯飲去詳見補遺曩囊上不樂岳䙝先入為一上去匕比共恭與預防房觶至毋无粥祝難去駘苔適的殉徇亢江又去養去下同得已以下同啜川入菽叔歛如字還旋稱去從者去下同羇基靮的毋无革京入襚遂縣𤣥毋无乾干屬燭尊已紀繹亦歛去般班封窆夫扶之母其母並音牡噫朞禺遇又務能為去重童踦蟻殤傷處上射食斃弊韔長去揜奄朝潮與預舍去强上為懿上去蕢蒯辟避畫獲莒舉奪兑柩舊朝潮䵍吐瘵反又他昆反音啍撥鉢輴椿幬盜榆俞沈瀋上中去學如字為去與余已以以妻去庚如字長上使去為去舍捨偏篇徵貞櫜羔韔悵重去苛何識志摯至已夫以扶墟祛慤康入涖利解皆上為去長張上嬴盈深去歛去廣光去隱去還旋號平婁閭含撼易則易並去長張上刎文上饑飢黔鉗敖翺而食似袂眉去輯集屨句貿茂奉捧食似與余瞿句斷煆壞怪洿烏豬誅奐喚要腰京原禱倒畜朂為去封彼驗反予與毋无䧟咸去閽昏為去内納廐救鄉向辟避下同􅋼溜覘苫説悦扶服並如字又作匍匐壤如字貍釐女如字卷拳為去從去已乎上以毋无譽預父甫行舊去又如字并併植值又時力知去追然上退或作安勝平呐訥又如說反屬燭學効衣衰催下同繆鳩繐歲末吾上抺成人本作郕音承衰者催下同蟹諧上緌㽔惡乎上烏縣𤣥不雨去下同暴蓬入尫汪毋无與余已以疏疎徙市上死下是為去祔附夫扶王制分舊去今作芬食似差义間田上閑朌班不與預以共恭長張上帥衰去卒尊入甸奠采採三監去監於上平卷衮論之去下同朝潮畜朂屏兵上比年上備朝潮守狩賈價好惡並去好去辟僻絀出假格禰乃禮反造去朝潮柷昌六反鼗桃鈇夫鉞越瓚粲鬯暢辟廱璧雍頖判禡罵訊信馘國一為去下同乾干不合如字又閤綏緌獺撻豺柴罻尉又鬰蟄直立麛迷殀杳夭烏老覆福杪眇耗毫去仂勒為去紼弗浩上溢逸縣𤣥封窆為去昭穆並如字後有昭穆二字連者並同礿藥禘弟犆特祫洽少去繭堅上握渥燕衣宴藉子夜麓鹿夫圭田上音孚猶治也粥育度度上渡下入沮徂去量直良任去食壯上似煖暖燥素老齊去和去械諧去被髮上彼義反衣皮上去衣羽上去鞮提譯亦量良度鐸參七南樂洛絀黜帥率下同朝潮與執上預屏丙論去選士去下同適的皆造上又去屏之上棘蒲北反方如字急也任官上壬臝羅上明辟闢剌去天論倫郵尤量亮别邊入汜泛比必利反三又當作宥侀刑行去粥育中去識不音諱惡去齊齋㑹檜勞去食似粻張離去絞音交紟其鴆珍從下去又平不與預齊齊喪桑燕衣上宴冔許縞羔上又去期不上朞少去矜鰥餼奚去瘖音跛波上躄必亦斷短侏朱食之上似隨行如字又杭鴈行杭任并下去斷長短為去朝潮冠貫長張入别邊入度量並去月令孟春參森皥旲又胡老反句勾芒亡律中去下同蔟湊脾皮蟄直立上上獺撻个箇乗平鸞鑾載戴讀為傳再衣青上去疏疎先去齊齋帥率還旋反乃朝潮相去令去毋无當去宿夙又秀離去貸特毋无耒雷去耜似措去參七南介界帥率藉籍推吐回勞去上騰上舎赦徑術汪作遂方曰徑道之小術道之末則如字是相去阪反隰習飭敕凖准毋无牝貧上覆福夭襖麛迷骼格胔漬蚤早疫役焱標又飄藜梨莠酉潦老摯至種上仲春奎睽弧胡華如字少去省星上又生上囹零圄語去上桎質梏谷掠亮祠詞禖媒帥率嬪貧韣獨先去令去度渡量亮鈞均甬勇漑少上舍赦闔盍漉鹿鮮獻更平掠略螟冥季春胃謂姑沽洗先上鴽如虹紅又逢見現蓱音平萍同鞠菊覆福乗平鮪為上乃為去泄屑句勾上上循行去隄低道導障章塞先則罝嗟罘浮翳伊去餧於偽反戴帶勝去植值蘧莒筐匡齊齋鄉向觀貫省星上共恭惰陀去量去筋斤膠交監平號去悖佩累縲難儺磔争入孟夏婺務徴底中吕上去又仲螻樓蟈古獲反蚯邱蚓引駵留説悦長大如字下同當去壞怪墮隳絺痴出行去下同為去勞去巡行去彘滯畜蓄靡米斷煆長張上酎胄數朔蝗皇仲夏亢剛又杭蕤緌肺非去螳堂螂郎鵙始扃入佼交上鞀逃鞞鼙竽于竾池飭勅柷充入敔語為去雩于百辟璧雛鋤艾刈暴蓬入索色挺亭上别邊入縶陟力反躁竈致和去晏宴解蟹始嗚上式志反半夏去堇謹眺條上雹陟角反螣特季夏奎睽蟋辛入蟀率腐輔螢熒鼉駝黿元葦偉監平共恭以為去黼甫黻弗貸特别邊入度渡行去令去辱本作溽音辱薙替又地上土疆上鮮仙欬開去隼笋鷙至中央於相戊已紀倮羅上霤溜圜圎閎宏孟秋少去蓐辱腥星駱洛軍帥去