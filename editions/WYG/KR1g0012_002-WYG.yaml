屬燭嫡的莊公元年孫遜單善郱平鄑晉郚吾二年禚灼馮憑三年酅兮難去舎捨四年将齊下齋樠門又瞞屈重下去又平溠詐又平汭芮下去難去五年郳五兮六年俘孚寗乃定反跪葵上度鐸衷去又中强上騅隹􅆅荅平噬齊上筮下齋君焉下煙復去七年見現夜中去又如字隕尹八年郕成降户江反兒如字又倪夏書上陶遥乃降書如字此以意者平稱去又如字至父下甫戍庶期基適的絀黜有從下去間如字又去女汝棼焚從者上去見去射石隊墜喪去屨句費秘御禦􅃝但背佩九年蔇噐乾干浚峻洙姝喪去傳如字又轉乗去辟辟又闢管召下邵竇豆稅脫又去傒兮相去十年勺灼乗去劌鱖見現間去分芬徧遍屬燭請從下去乗去轍徹軾式有伏如字靡美雩于臯比下皮過去譚覃十一年鄑兹宋為下去陳陣薄无音作博雋俊覆无音注云若羅網掩覆而禽之當音伏兵之覆罪已下紀悖勃御禦説悦共恭射石長張上歂遄搏博靳巾去十二年酅兮批如字又編入乗去飲去比畀見現醢海十三年柯哥戍庶背佩十四年單善鄄絹真旃三音櫟厯舍捨燄艶裏言上里祐右為去語去食似堵覩敖遨易去鄉向撲扑十五年郳霓復孚去間去又聞十六年為去與預閼遏公父甫復服共恭刖月鉏鋤詭鬼蔿危上復之上去十七年殱尖麋迷頜閤又烏納反戍庶十八年濟上􅈮又作蜮音或廣韵並音域緡民那儺處上又去涌勇十九年媵孕又剰鬻肓踖迹又七畧反湫焦上絰迭强上閽昏姚羊消反嬖閉二十年哀樂下落奸干二十一年弭敉辟璧入虢守下狩玤棒鞶盤又歩干反予與惡去二十二年眚生上御冦上禦擔檐去飲去樂洛卜妻去媯九危反少去見如字又現觀貫否皮上觀焉上貫著直畧反二十三年射石又亦扈户劌蹶朝潮偪逼二十四年桷角御禦徳之共无音自漢翟輔䟽引此作恭司馬公訓儉又引此作共言儉者上下共行則知讀為恭者非别邊入二十五年女叔上汝好去正月上政朝潮眚生上二十七年洮陶竟境誰與如字畜蓄樂和上洛亟其去召邵廖聊二十八年郿眉糴狄數所賈假重耳上平驪離女以上去屈居勿反埸亦説悦令尹上去蠱古乗剰桔結柣陸待結反御禦彊如字又姜比如字殿顛去縣𤣥諜牒二十九年廐救蜚費輕去見現栽在又再三十年降平鄣章濟上射石又如字梏谷榖奴走反漢書作榖注作㪍於烏莵徒紓舒難去三十一年遺去俘孚三十二年般班為去下同見現史過平監去嚚銀黨掌閟祕犖洛鄉向鍼其㢘反酖沉去共仲上恭閔公元年豺柴厭平暱女乙反酖沉去復服湫焦上省星上難去去上間去覆福覇王下旺将去又焉下煙令去屯窀比鼻瘳聊蕃煩長張上覆副復服二年孫遜汭芮僑喬齮蟻共恭與預復服好去乗平焉煙玦決守狩殿顛去熒螢華去少去强之上去共恭稱去兩去惡去為去守狩從去監平適的焉煙舎捨共恭難去公衣下去偏衣平下本衣同餘並去逺去衷中尨莫江反逺去脤辰上諗審適的難去繇胃屬燭乗去僖公元年聶攝注女輙反檉頳酈離挐桃又女居反又音拏復去潰㑹犖洛虚丘上墟費秘已甚上以二年屈困入乗去懦暖去又需强上少去長張上軡零鄍㝠寺人如字又侍貂凋易去稔荏三年為去乗平四年陘刑召邵下同處上女汝共恭縮所六反徴貞復服乗去是為下去好去徼澆侯見下現共其上供扉翡説悦朝潮歛去繇胃渝羭並俞蕕由胙祚墳粉傅付不樂下洛縊翳五年觀貫為二去稽啓焉用上煙尨莫江反又蒙茸戎適的及難下去校教垣袁袪區翟狄女以上汝朝潮輕去喪去復去輔車尺奢反之昭如字不易書音亦繄醫馮皮氷使去謡遥振真之旂下芹鶉純賁奔焞它門反易去六年郤隙以見下現衰崔絰迭櫬初覲反祓拂復服七年寗母如字又无請下去女汝也已以不易亦洩泄奸干堵覩又者間去惡去難去八年射石期朞難去長張上九年御禦説悦佹詭殺其如字又弑胙祚耋迭勞去級急遺去先去㔻丕藐眇又貌猜倉才反焉煙辟避已乎上以令去不好下去長張上鮮上好惡並去焉煙十年大雨下去以説如字共恭復去不見現又如字稱去又平泠伶重上行杭下同共恭騅隹歂遄背佩焉煙十一年召武上邵過平也已下以長張上又如字拒舉十二年難去共恭焉煙二守下狩勞去十三年鹹咸復服為去難去荐薦重上施去是惡如字雍去十四年鄫本作繒似陵反期其幾祈又機背佩施去射石傅附十五年螽終屬燭背佩華去解蟹乗去孫遜乗平易亦張去憤奮彊强乾干師少下上施去狃紐還旋濘寗號平輅迓拔跋舎赦罃鶯免問衰催舎赦喪平焉煙重去要腰背佩任壬質置祇攴爰袁喪去好去惡去説悦刲睽􅎺荒責言債又如字償尚又常相去嬴盈好去惡去説悦刲睽虚墟夫扶數乎上所僔尊上舎捨蛾蟻又俄析晳焉煙餼嬉去十六年鷁迎入過平焉煙難去呼去還旋十七年為去質致妻去嬴盈過平宦患好内上去長張上少去華去屬燭共恭貂凋十八年甗獻言彦三音菟徒朝潮燬毁訾咨婁樓十九年雎錐屬燭畜嗅為位無伯如字降平復去壘累省星上好去亟去處上罷疲二十年堵覩又者為去難去量良鮮仙上二十一年尫汪省生上薄如字任壬句鉤濟上為去紓舒二十二年渾平又上質致櫛榛入比鼻焉能上煙説悦復去易去蠭蜂蠆釵又丑邁反縣𤣥也已下以陳陣殱尖重去隘挨去勍檠耉苟儳土减土咸二反芈彌上勞去柯哥縉晋馘肱入閾域别邊入二十三年緡音旻不與下預靖静者與餘幾如字期期上如字下基從去聲委質如字辟闢已則上紀辟避難去校教從者上去廧墻咎皐隗五罪反鯈疇妻去盾豚上塊恢去又快妻之上去乗去醒上共恭駢薄賢反裸羅上薄博相去夫扶飱孫寘止去詹占蕃煩從之如字又去儕柴過平辟避三舎下赦弭彌上屬燭櫜去鞬居言反惡之上去與預奉捧匜移盥管從去二十四年絏泄從君上去令狐上零荀偪逼見現女汝為去袪區難去射石鉤鈎相去豎樹藏去見現覆福守狩遽其據反妻去從亡上去已力上紀懟墜焉煙與女下汝蕃畨屏上郜告雍去酆丰郇荀昭如字邗干胙祚祭債召邵下同常如字鄂萼韡偉䦧馨入聾籠别邊入嚚銀施如字厭去又平惏力南反欿坎汜几好去鷸聿惡去衷忠又去已之上記稱去膰煩難去官守狩下同辟避鉏鋤二十五年阪反隧遂惡去攢鑽才官反呼去鄀若又楮斫弱隈煨傅附降平諜牒舎赦守狩鞮提飱孫從去餒内上二十六年犒靠竟境縣𤣥罄磬勞去縫逢道導鬻育摯至援院二十七年不共下恭復去貫官又如字飲去乗去施去縠一作榖同亟去説悦将去溱側巾犫袖共恭二十八年歛盂上亷又如字以説稅或如字下同兇上棺貫又官數所施示爇如悦反見現使去躍三百百音陌般班舎捨當去棼焚間去少上廣去宛鴛又如字施去説去説悦辟避舎赦背佩亢抗夭上愸銀去濮卜酅兮舎赦每每梅又去舎捨搏博伏已下紀盬古腦惱馮憑軾式與預寓遇為去乗去詰輕入朝昭韅顯去又靷寅去鞅央上靽半少去長上陳陣将去雍去鄉向傅付輅路玈盧卣酉又由賁奔要平隊墜攻平又去謂已下紀女汝也已下以奉已下紀從公去又如字守狩先期上去牂臧使去乗去歂遄華去射石枕去瞞謾平奸干茷伐馘國鍼鉗槖託饘㫋獳奴侯反解皆上復服舎捨説悦三行下杭二十九年大雨下去雹弼角反見現復去好去三十年間去酖直禁反為去㲄角廑慬覲勤三音適的縋墜焉煙舎捨共供厭平説悦夫扶知智平與預歜在感反三十一年濟上重平共恭洮陶相去間間厠之間惡去三十二年軼迭又逸悖佩與預辟避三十三年乗去輕去以乗下去先去從去為去積漬餼希去為吾上去以間下閑勞去朝條天奉俸施去其為下去衰催嬴盈厭去又平朝潮舎捨墮隳長張上鄉向復去過平鯀衮相去共恭先且下狙行杭朝潮覆福髠坤屯豚歛去鄶檜泜雉又上舎赦陳陣紓舒薄无音當音傳辟避祔付文公元年頵於倫反相去見現食似難難又如字悖佩訾貲共恭更如字又庚蠭蜂豺柴芈敉呼去女汝蹯煩瞑冥又眠環如字又患要腰援院敗拜芮如鋭反隧遂覆福復去二年呼去瞫審乗去女汝難去共恭陳陣施去辟僻厭炎入為衛上去不先去下同鯀衮契屑窋知律反解懈不知下智為去好去三年沈審雨去螽終不解下懈隊墜樂洛嘉樂上假下洛四年壞怪邧阮又元為之上去度鐸肆移去朝條正政樂洛湛談上愾許計反玈盧貺況五年舎去賵鳳鄀若又直畧反蓼了陶遥援院嬴盈沈漸書作沉潛難去六年射姑上亦又如字不告月如字讀為朔者非舎二上捨辟闢洿烏佗鮀任壬子車下居仲行下杭鍼鈐又朱升為去分去予與道導遺去復去焉煙少去難去長張上好去杼舒上又余上子樂岳又洛辟闢偪逼姞其吉反隗五罪反而已下紀郫皮臾羊朱反駢便平帑奴知也上智竟境為民如字七年須句其俱反郚吾間去或如字難去矔貫華化御禦去上􅄻䕃舎捨適的焉煙屬燭堇謹又公靳反先人上去蓐辱刳枯之使下去為去焉用煙酆風戴已下紀則為去舍之上捨復去不樂洛説悦八年雒去解蟹復去竟境復之上服蒯快九年共恭少去茷吠禭遂十年女栗上汝又如字少去徴如字又懲又上矞聿强上縣𤣥王使下去泝訴湏王上致勞去道導燧遂抶秩麇君十一年鹹咸來見下現鄋搜又騷瞞平乗去僑喬摏舂胹而夫鍾上扶十二年鄆運又鄖邽洼重之上去腆田上儌澆要平藉去令狐上零惡去輕去交綏鄭追車為綏憖魚刃反薄博十三年蘧渠蒢除棐芳味反詹占塞去難去行杭智智帑奴夫扶背佩繞遶朝如字又凋譟噪還旋繹亦必與下預遷千十四年孛佩又勃單善頃傾妃配施弛貸待又忒貜攫又俱碧反且沮長張上復服守狩䴢君已氏紀又祀難灘告難下去焉煙十五年華孫上化為去從之上去共恭聲已紀毋絶上无説悦逺去句勾鼆萌上與預還旋難去已則上紀女汝相畏去又如字十六年郪西又妻杵追上臼求上君間如字訾子思麇君濮卜選如字又去阪反句勾澨筮復服克或作撃蚡粉陘刑隰習北如字又佩禆皮鯈紬乗平馹日鮑上不數下朔豔艶矔貫子朝如字紓舒難去甸奠十七年難去復去與預蕆勅展再見下現幾紀音與䕃同鋌挺為去質致歜觸邥審十八年罃鶯邴丙歜觸勝去掘其月反乗去扑波入抶姪女汝舎赦長張上屬燭見現聴去復去佗駝竟境隊墜養去鸇旃度鐸食似還旋隤頽獃外平又嵬又瑰檮桃戭衍尨厖降杭愷凱貍釐好去嚚銀比鼻渾上敦徒本反少去皥浩譛曽去舎赦檮桃杌兀去上縉晋饕叨餮徹魑螭魅媚相去數所幾機宣公元年為立上去共恭解蟹二年馘國輅五嫁食士上似與預牂臧植值睅環上皤婆腹服思腮又如字復去來犁又如字乗去那乃多夫扶惡去難去歛去彈平辟避胹而蹯煩畚本朝潮留留去鉏鋤麑又迷盛成朝潮槐懐又梅飲去提本作祇上支反嗾叟夫扶獒翺搏博舎赦食似舎其上捨遺去槖託而與下預復服為法上去臀屯麗離適的公行下杭旄毛三年準宏郔延雒洛勞去㡳㫖郟夾鄏辱姞其乙反與已下紀鯈紬徴貞媯九危反葉攝惡去蕃煩亢抗刈乂四年剡談向尚黿元見現及食下似告去畜嗅長張上舎赦畜朂難去般班惡去嬴盈轑遼質致漳章澨筮滸虎棼焚射石汏太輈晝平跗孚著直畧反轂谷䢵云自為下去六年貫慣殪翳召邵廖聊間去七年與預向尚相去八年復服諜牒辟避九年易去衷中又去衵一又日朝潮洩泄冶也聞如字又問令去多辟下僻辟闢十年杼除上守臣上狩使去女汝射石斵竹角十一年櫕才丹反函咸櫟厯焉煙度鐸為陳上去少西上去轘患使去女汝蹊兮復去儌僥十二年邲必又弼臨去陴脾復去袒但好去儌澆泯民上能下去幾冀尫汪質致縠如字又谷