為去邪耶鉏鋤質致女汝飲去淄緇厭掩又葉勝升又剩炊吹射石中去繇由朐渠匕比亢抗晳析鬒軫下去刜弗斷短鑋磬又輕呼去乘去禇主又紵雚丸又貫塞去適的長張上好去而惡如字援院賂路召邵般班難去彘治間去頽徒回反施去辟僻難去頿髭共恭間去惡去弔如字又的厭平貫慣蕩唐上底旨適的立少下去間去焉父下甫彗遂禳瀼祇之説悅施去區謳施如字斂去女汝少上已之上以家施下去滔叨令去二十七年郤宛隙寃莠有麇羣戌恤鱄專索色堀窟鈹披刺七説悅比鼻惡去飲去好去幾祈群帥去爇軟去菅姦秆古但反炮庖呼去説脫且知上徂難去幾平焉煙知去其朝下潮重上又平二十八年個箇惡如字又去立辟下闢為去憖銀去食我上似鮮上少去貊陌黰真上取如字又娶婪藍饜平纇雷去羿詣共恭女汝強上長張上姒似喪去知徐上智鱄專又附去行去度入莫陌又如字長張上比如字施以䜴反鬷宗使之上去以上下上射雉上石能射如字女汝夫扶揚揚幾祈今汝女下同毋無墮隳斷煆閻炎女汝朝潮比必利將軍食下似屬燭厭平又去二十九年祇支數所鄻輦賈古從去乘去塹七見切為去犢獨食似裹果見現智知畜朂豢患飂溜好去耆嗜飲食並去鬷宗夏上擾澆乘剩食似下同纍上更庚醢海夫扶泯敏坻旨又底湮因句勾芒忘作忙非蓐辱姤媾見現少去皥浩曰重下平共恭以上下上與豫三十年頃傾子蟜下矯共恭禦御好去邑之間間下同紼弗底旨女汝省眚監平好去重去喪去焉煙斷短伍貟下云惡去適的任壬肄移去亟欺去罷皮三十一年躒厯適厯上的跣先上費祕知伯上去好去夫人上扶與豫難去乘剩衆從下去稽啓又如字懲澄難去徼澆冒墨又如字數所裸羅上謫責三十二年蝥矛施去與預紓舒焉煙傒兮上渝俞揣丁纍反又吹上度入量良屬燭帥去琥虎妃耦上配乘平始震如字又音身聞問費祕適的定公元年煬羊去屬燭過戈裁在又再仲幾下機邳皮虺毁相去焉煙亟欺去中去得見下現從去壞怪隤頽闞口暫反駕加鵝俄惡去焉煙二年兩觀下貫為去射亦敲去三年射亦乘剩好去肅如字又所六反爽霜駿馬名從去飲去相去夫人上扶償常去共恭沈鴆質致四年姓生卷權又倦鼬由嘖在責切又責祝他下駝從去共恭徼澆𨽻利竟境祓弗又廢以從如字又去好去長張上相去分去封父下甫繁弱如字勺杓虛墟綪茜七見反茷步貝反又吠繁氏婆相土上去疆薑周索桑入洗先上冷上分去惎忌間去蔡蔡上索達反下如字改行下去之昭如字説悅乃長張上召陵上邵臨去語去怙户敖傲復去貟云噽丕上乾虔質致隧遂轅袁軛厄惡去好上而陳下陳别邊入難去陳于上陳夫槩上扶乘廣並去芈米雎狙針針句卑上勾剄景裹果中去鄖云從去非知下智女汝施衣去辟僻難去爐爐見現復服莽忙上分去勺杓又灼為去五年亟急璵余璠煩斂去為去費祕勞去射石又如字暴蓬入闉因與于又如字罷皮葉涉從如字又去藐邈又眇歜觸亹尾帑奴前惡如字舍捨又赦為去逺去妻去脾皮泄泄六年為去舍赦難去質致強上鄀若使去説悅溷侯慁侯困二反飲去楯盾賈加使去五父下甫蕕由又去辟避七年鹹咸墮隳難去女汝黨掌八年傳如字射石中去頰兼入呼去殿顛去好去使去大行下杭濡儒褐曷苫店鄟專涉沱下駝焉煙歃杉入捘最捥烏貫反詬候質致難去朝潮更庚鈹披盾純上殿顛上咋乍射石中去説悅舍赦從去辨舍上遍下如字歡歡歂遄九年向尚衰七雷反舍捨災災罷皮焉煙鍥挈蔥匆又如字霤溜下去難去靳巾去取娶禇攄去帥去禚酌晳析幘䇿又責貍釐貺况推如字又退平十年鄆運歡欠郈后彄苦侯反祝其並如字相去逼逼遽詎辟闢又避竟境還旋共恭犧羲又莎秕鄙稗排去夫扶其已下以邯寒鄲丹􅑒尖稙殖又植藐邈射石為之上去凶凶又上紓舒逼逼呼去殿顛去數所嬖庇蘧渠魋頽抶初乙反頗坡竟境為去迋求往反又召况反屬燭所惡下去十一年叔還下旋十二年彄摳墮隳費祕殿顛去申句下劬頎祈障如字又章子偽並如字或偽作十三年葭加比毗射石又如字朝如字郹扄入邴柄又丙傳轉又如字侯乘下去廣去比庇為去又如字從去説脫我説如字知文上智相惡如字又去鰌秋難去鮮上與預惡去十四年牂臧檇醉比蒲上毗惡去難去與去焉煙莫暮背佩好去句踐上勾陳陳三行下杭屬燭又注剄景將去陘刑夫扶差義唯上為去婁樓豬張魚反艾五蓋反豭加戲希朝潮少君上去余説如字紓舒露路十五年鼷兮蒢除朝潮而中下去遽渠拏女居反又拿祔附哀公元年裁在又再夫屯並如字夫兵也屯守也夫椒上扶檇醉楯盾會檜稽圭種上嚭皮上貟云去上有過下戈澆曉去又敖斟針灌貫鄩尋相去緡民娠震又真竇豆少去惎忌妻去姚遙綸倫女如字又汝艾五蓋反諜牒杼紓豷希去過戈復服施去長張上求伯如字又霸復服芥界艾刈暴逄入莽忙上闔合廬閭不重下平彤同鏤陋觀貫費如字災災癘利共供分芬卒尊入乘剩與預罷皮嬙牆好去觀樂下洛夫扶也已下以二年漷轟入又郭句鈎繹亦絞狡立女下汝祇支絻問般班先陳下陳契如字又挈艾刈詬姤又苟志父下甫絞狡縊翳屬燭辟擘朴朴郵由乘平麇君又羣上店苫在難下去佚逸筋斤中去蜂蜂復去叟叟有知下智艾瓦蓋反尨厖般班殿顛上射石韜叨嘔謳上郵尤靷引去乘去以説如字三年庀披上女汝共恭校效乘去轄轄濟去又上鬱攸聿由悛銓父甫槐懷瀋沉上還環又患共劉上恭惡去四年承懲射石鍇楷又皆中去盱吁眅攀上又攀葉攝函咸郢影單善雒洛莬徒好惡並去少去為去降杭墮隳任壬鄗壑又烘入畤止五年惡去夫扶好去鬻育姒似荼舒茶徒三音長張上惡去間間又去疢敕覲反樂洛黔鈐人琴與預惡去解懈鮮上六年柤查父甫乘去逼逼需須又弱儒當考難去乘去舍捨禜詠夭上焉煙雎狙漳章行如字又去上乘下去闞瞰壬平差所宜反點平又如字女汝背佩拘俱説悅句鉤竇豆難去少去長張上夫扶駘苔殳殊冒帽淳純七年長張上共恭斷短裸羅上背佩焉煙惡去不樂下洛柝托掠亮乘去馮平背佩辟僻好去説之悅下同背佩姦干𨝍干八年歡歡闡如字過戈殿顛去詬后為去夫人上扶惡去又如字覆福率誰去泄泄泄率所類反竟境鄫繒漚謳去菅姦道導淡待甘反好去舍赦泗四屬燭踊勇卒如字終也與預也已下以易子如字析昔骸諧㸑竄輕去少上載如字又妻去魴房栫千去女汝麇羣上九年瑗院雍丘上賸盈去舍捨𨝍寒警景十年鄎息犂黎轅袁十一年頗如字又坡丕丕守狩從如字又去屬蜀朝潮俟仕黨氏上掌強上共供乘去邴柄又丙周父下甫卒尊入瓘貫殿顛去惡賢上烏諜牒語去僮同錡蟻乘去殤啇咺玄上糗起九反腵煆又丁亂反脯甫為去嬴盈含去鈹披褽尉纁勳組祖衷中使上朝潮豢患夫扶共恭使去屬燭鏤力俱反乂樓檟假而妻下去姞其乙其吉反鄖云飲去簋軌度鐸難去卒曰如字施去斂去冒墨又如字厭平十二年橐拓又託與弔上預絻問要平且狙摽敷消反普交反瘈吉世反噬逝舍赦餼希去難去墮隳説悅舍赦又捨隙輕入彌如字又上頃如字暢帳嵒岩戈如字錫陽又如字十三年孛佩夏上區謳郜告又谷為虛如字為墟非泓烏𢎞反屬燭惡其上去剄景長張上旰汗輕去使去以見下現六人從下去恭共祇之蕊蕊盛成又如字褐曷之父如字又甫睨詣粗粗呼去勝去十四年麟鄰邾射下亦句鉤繹亦要腰闞苦暫反遺如字又去潘芳袁反沐木長而張上僂縷説悅立女下汝逺如字又去舍去乘去幄握需須屬燭弇奄又淹耐而雍去鞍安余長張上惡去乘去麋眉所難下去共恭頎祈祇之質致乃舍赦又捨璜黃惡之上去坑亢又剛曰齊下上泄泄圉語從去弗內如字又納袒但免問共恭十五年汭芮勞去潦老乃廩下稟芋喻備使下去使人上去隕隊下墜共恭積漬又如字內之如字又納瓘貫過戈斫喪下去惡去贛貢背佩喪去焉煙冠如字又貫濟上禚闕取娶悝恢豎樹長張去使之去又如字無與下豫舍赦而乘下去豭加強上炙蔗召邵乘去難去辟避使者上四焉煙燔煩舍捨又如字盂于黶黯斷短云上瞞莫干反禇史吕反十六年誄壘旻民弔釣又的憖銀去屏丙煢瓊尼父下甫飲去祏石公為如字人名射石逺去從去辟華上避下去葉攝竟境女汝長張上見現説悅不為下去抉越葉攝饜厭去以幾下冀艾乂亦夫如字又扶長張上頯夔沈審比鼻強上十七年陳陳句鉤御禦難去椓琢相去率所類反鄀若舍捨觀貫繇由竀敕呈反衡橫方旁般班鄄絹墜墜髢大計反酁讒十八年鄾憂薳蕊二十年為去説如字又悅質至間去共恭難去句勾二十一年傳轉比庇二十二年甬勇二十三年與豫繁磐户板反御禦守狩使去二十四年使去徼澆焉煙躗垂去餼希去妻去二十五年禇主許角斷短乘剩帑奴飲去從去又如字鄄絹間去泠伶卒尊入好去道導內如字又納重平又去祝如字又去惡去飲去樂洛二十六年茷吠幾機相去惡去連如字又輦畫獲首去咮晝别邊入使去孫遜二十七年駘苔夫扶屬燭涿琢難去女汝毋無衣去阪反輕去以壓壓間去孫于上遜桔賢入柣迭入酅兮惡而如字惎忌喪去明本排字九經直音卷下
