逸知者上智衰催樂洛冠貫笄雞别邊入食似勝去易去沿綴輟又如字周還下旋裼昔襲習别邊入下同辨遍亨烹夏去長張上敦和上淳又惇齊濟摩磨蕩上暖瑄又桓蟠槃樂著直略反著不上去又涉慮反舞行綴輟又如字諡示其行下去豢患綴輟以樂洛下哀樂同分去著去心知下智噍焦殺色界思去嘽闡易去康樂下洛賁分上肉柔去或為溽好去辟僻狄逖稽平道導之行去省星上稱去比鼻見現長張上樂而上洛易去湎免倡和去分去行去辟僻心知下智還旋樂也上洛下同鄉向樂其上洛見方上現以著下去獨樂下洛厭去情見下現好去施去輅路緣去偩負欣合上僖又欣煦虛去嫗於去又傴區勾又如字觡格伏浮去鬻育孕盈殰獨殈洫行成上去今夫下扶拊撫以相下去侏朱儒獶與猱同乃刀反所好下去當去疢趁莫貊長張上王旺俾比徐去祉耻施異好去燕宴趨促數速敖去辟僻喬驕夫扶孔易去鞉桃控腔楬堅入塤喧篪池竽于狄翟酳胤酢昨鏗口耕號去橫光去磬罄鼙皮歡歡又宣將帥並去鎗鏘憲去萇長遲之遲上遲去下平語去女汝周召下邵綴輟又如字分扶問反商上及薊計祝如字之行下去復服弛矢華如字又去弗復浮去乘平釁釁建汪讀健其居其偃二切櫜羔不復下去郊射入又去禆皮搢進笏忽賁奔説脫食似五更庚酳胤易直上去錯措報褒去耐能道導肉柔去族長上去詘丘勿綴堆去行列上杭鈇夫鉞越儕柴贛貢斷煆隊墜倨椐中去句如字鈎勾纍縲説之上悅雜記上復伏乘去蕤綏輤蒨裧襜説脫輲遄訃赴長張上適的適者上敵某實上上堊惡為其上去衰催相去袒戰狄稅假揄遙屬燭功衰下催散上與預繅早遣去章去椈菊枇比長張上率律蒂帶甒武筲捎衡杭又如字見間合見間二字為覸辨遍稅衣假袡如占為君使上下並去卷衮含去執要下腰襚去某相去拾涉乘去雜記下顈褧與祭上預舍赦酢昨嚌齊去啐催去稱去少去解去期基見乎上現疏踈衰催長中上上瞿句朝潮輠華上又禍遣去餘與豫卷捲為去問與賜與並于遺去下同從父上去縣玄期期不與下豫綍弗皆為下去人食下似食食下似瘍羊創瘡免問堩亘辟避從祖上去喪冠去下同取娶不偯衣上菲去相去含去臨如字又去比畀引去逼逼其行下去樂乎上洛為去下同辟也僻不與下預辟也上避純緇衈餌鄉向豭加使者使臣並去共恭粢盛上兹下成少施上去食我去飱孫見現鬈權長去廣去會古外紕皮純諄去紃巡喪大記縣玄去上首去屬燭適的卷衮屈闕頳癡貞袒戰稅去號毫衣尸上去斂去袡髯為去跣先上扱衫入使去馮憑説脫奉捧汜泛免問拾涉縣玄鄉向以衰催為之上去輯戢斷短造去併上擅旃上第滓含去憮呼楔屑管如字又去不説下脫繘橘枓主又斗挋震差嵯垼役重平鬲厯厞非去莫暮疏食上疏下似盛成期期下同為去不與下去君食似絞户交反下同稱去襟巨禁不辟避又擘紞覃上復福褶牒襌單詘屈大胥祝殺去裁去姪迭盥菅凷塊屬燭椑平入鐕子南鬊舜緑角輴春幬道種上欑平偽帷披彼義綏緌揄搖國車上團以咸緘甒武祭法禘第一嚳酷顓專頊凶入契屑鯀衮瘞曵折逝騂息營少去相近注作禳祈孔叢子以為祖迎幽宗下注讀為禜音詠下雩宗同見怪上現更庚祧挑墠善疏疏少上適士嫡顯考顯為皇王為去下同霤溜殤傷適的夫扶災災捍扞厲山上列左傳作列也共工上恭下同以著去鄣章殛棘祭義數朔下同疏疏春禘第悽妻愴去濡如怵黜惕剔致齊齋下同散上處上所樂嶽又去嗜示僾愛還旋愾開去夫扶養去夫日上扶鄉向相君上去齊齊如字又上榆于樂與上洛下同趨促數朔又速贛貢濟上漆切夫何上扶慌恍惚忽當去比畀又鼻屬燭勝升也與豫詘屈愈俞敖傲敬齊如字又如奉下捧恪慤長張上為其去下同王旺錯措序從下去袒但刲睽膟律膋聊爓徐廉反古注燖暗暗以朝昭别邊入巡沿悖背去上竒羈隂蔭焄熏黔鈐祧挑燔煩燎料羶馨薌香見諫見間注合二字為覸音諫二字同音俠夾甒武為藉籍紘宏酪洛齊咨盛成朝之上潮蠶才南昕欣之朝下昭奉捧種上以食下似單丹繭堅上服與余下同禕暉少去其率類又律繅繅盆蒲奔反易直上去諒亮則樂洛下同慢易下去輝輝錯措報褒養去言與下于先意上去直養去陳陳災災亨烹羶馨薌香不遺如字又去夫孝上扶溥之上敷放上凖準斷短匱葵去施去嘉而或作喜惡之上去數月上所瘳抽頃葵上不併下上錯倉入辟避不遺平甸奠長張上獀搜食似五更下庚酳胤守去竟境長老上張上卷衮知上斷煆齊齋陶遙復去思去術述省星上祭統重上於已下紀長張上道之上導為去養去畜朂則養下去之行下去取娶菹爭魚醢海所長張上共弓純服緇下純冕同方如字齊齋下同齊也齊不齊以齊之並如字先去宿肅褘惲瓚殘上紖陳上又引從去涗稅嚌才細以樂洛下同竟境三重下去餕俊謖縮官進當為餕施去見其修本作遍重去夫人上扶本與下豫所惡下去是與下豫見現殺去為去祊崩子行杭又乎孟反散去鄉向舍釋卷衮褘輝執校效又呼交鐙登又去處去髀俾又部禮反重平見現畀庇輝運胞庖翟狄閽昏見之上現艾刈論撰下撰身比鼻下同知足上去悝魁假格左佐右佑難去射亦纂纘又子管反不解皆去豫與女汝以辟闢方作避重去經解解皆上疏疏易良上去屬燭比鼻遺平號去令去説恱去上王旺縣玄坊防壞怪辟僻行去逺去氂釐繆謬哀公問長張上别邊入疏疏數朔臘昔幾祈好去敖傲午忤當欲上去愀悄又秋上親迎下去舍上遺平與豫已重上以下上之好下去焉得上煙少進上上與豫愾餼又既也已下以樂天上洛不已下以憃舂又充冥如字又明去煩如字子志識又試蹴足又促辟辟仲尼燕居女汝下同語去中去食似此中去下同夫扶惡如字好如字與于食