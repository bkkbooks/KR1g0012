屬燭嫡的莊公元年孫遜單善郱平鄑晉郚吾二年禚灼馮憑三年酅兮難去舍捨四年將齊下齋樠門又瞞屈重下去又平溠詐又平汭芮下去難去五年郳五兮六年俘孚寧乃定反跪葵上度鐸衷去又中強上騅隹𥅆答平噬齊上筮下齋君焉下煙復去七年見現夜中去又如字隕尹八年郕成降户江反兒如字又倪夏書上陶遙乃降書如字此以意者平稱去又如字至父下甫戍庶期基適的絀黜有從下去間如字又去女汝棼焚從者上去見去射石隊墜喪去屨句費祕御禦袒但背佩九年蔇器乾干浚峻洙姝喪去傳如字又轉乘去辟辟又闢管召下邵竇豆稅脫又去傒兮相去十年勺灼乘去劌鱖見現間去分芬遍遍屬燭請從下去乘去轍徹軾式有伏如字靡美雩于臯比下皮過去談覃十一年鄑兹宋為下去陳陳薄無音作博雋俊覆無音注云若羅網掩覆而禽之當音伏兵之覆罪已下紀悖勃御禦説悅共恭射石長張上歂遄搏博靳巾去十二年酅兮批如字又編入乘去飲去比畀見現醢海十三年柯哥戍庶背佩十四年單善鄄絹真旃三音櫟厯舍捨焰艷裏言上里祐右為去語去食似堵覩敖遨易去鄉向撲撲十五年郳霓復孚去間去又聞十六年為去與預閼遏公父甫復服共恭刖月鉏鋤詭鬼蒍危上復之上去十七年殱尖麋迷頜閣又烏納反戍庶十八年濟上􅈮又作蜮音或廣韻並音域緡民那儺處上又去涌勇十九年媵孕又剩鬻肓踖迹又七略反湫焦上絰迭強上閽昏姚羊消反嬖閉二十年哀樂下落姦干二十一年弭敉辟璧入虢守下狩玤棒鞶盤又步干反豫與惡去二十二年眚生上御冦上禦擔簷去飲去樂洛卜妻去媯九危反少去見如字又現觀貫否皮上觀焉上貫著直略反二十三年射石又亦扈户劌蹶朝潮逼逼二十四年桷角御禦德之共無音自漢翟輔疏引此作恭司馬公訓儉又引此作共言儉者上下共行則知讀為恭者非别邊入二十五年女叔上汝好去正月上政朝潮眚生上二十七年洮陶竟境誰與如字畜蓄樂和上洛亟其去召邵廖聊二十八年郿眉糴狄數所賈假重耳上平驪離女以上去屈居勿反埸亦説悅令尹上去蠱古乘剩桔結柣陸待結反御禦強如字又薑比如字殿顛去縣玄諜牒二十九年廄救蜚費輕去見現栽在又再三十年降平鄣章濟上射石又如字梏谷榖奴走反漢書作榖注作勃於烏莵徒紓舒難去三十一年遺去俘孚三十二年般班為去下同見現史過平監去嚚銀黨掌閟祕犖洛鄉向針其廉反鴆沉去共仲上恭閔公元年豺柴厭平昵女乙反鴆沉去復服湫焦上省星上難去去上間去覆福霸王下旺將去又焉下煙令去屯窀比鼻瘳聊蕃煩長張上覆副復服二年孫遜汭芮僑喬齮蟻共恭與預復服好去乘平焉煙玦決守狩殿顛去熒螢華去少去強之上去共恭稱去兩去惡去為去守狩從去監平適的焉煙舍捨共恭難去公衣下去偏衣平下本衣同餘並去逺去衷中尨莫江反逺去脤辰上諗審適的難去繇胃屬燭乘去僖公元年聶攝注女輒反柳頳酈離拿桃又女居反又音拏復去潰會犖洛虛丘上墟費祕已甚上以二年屈困入乘去懦暖去又需強上少去長張上軡零鄍冥寺人如字又侍貂凋易去稔荏三年為去乘平四年陘刑召邵下同處上女汝共恭縮所六反徴貞復服乘去是為下去好去徼澆侯見下現共其上供扉翡説悅朝潮斂去繇胃渝羭並俞蕕由胙祚墳粉傅付不樂下洛縊翳五年觀貫為二去稽啓焉用上煙尨莫江反又蒙茸戎適的及難下去校教垣袁袪區翟狄女以上汝朝潮輕去喪去復去輔車尺奢反之昭如字不易書音亦繄醫馮皮氷使去謡遙振真之旗下芹鶉純賁奔焞它門反易去六年郤隙以見下現衰崔絰迭櫬初覲反祓拂復服七年寧母如字又無請下去女汝也已以不易亦泄泄姦干堵覩又者間去惡去難去八年射石期期難去長張上九年御禦説悅佹詭殺其如字又弒胙祚耋迭勞去級急遺去先去丕丕藐眇又貌猜倉才反焉煙辟避已乎上以令去不好下去長張上鮮上好惡並去焉煙十年大雨下去以説如字共恭復去不見現又如字稱去又平泠伶重上行杭下同共恭騅隹歂遄背佩焉煙十一年召武上邵過平也已下以長張上又如字拒舉十二年難去共恭焉煙二守下狩勞去十三年鹹咸復服為去難去荐薦重上施去是惡如字雍去十四年鄫本作繒似陵反期其幾祈又機背佩施去射石傅附十五年螽終屬燭背佩華去解蟹乘去孫遜乘平易亦張去憤奮強強乾干師少下上施去狃紐還旋濘寧號平輅迓拔跋舍赦罃鶯免問衰催舍赦喪平焉煙重去要腰背佩任壬質置祇攴爰袁喪去好去惡去説悅刲睽􅎺荒責言債又如字償尚又常相去嬴盈好去惡去説悅刲睽虛墟夫扶數乎上所僔尊上舍捨蛾蟻又俄析晳焉煙餼嬉去十六年鷁迎入過平焉煙難去呼去還旋十七年為去質致妻去嬴盈過平宦患好內上去長張上少去華去屬燭共恭貂凋十八年甗獻言彥三音菟徒朝潮燬毁訾咨婁樓十九年雎錐屬燭畜嗅為位無伯如字降平復去壘纍省星上好去亟去處上罷疲二十年堵覩又者為去難去量良鮮仙上二十一年尫汪省生上薄如字任壬句鉤濟上為去紓舒二十二年渾平又上質致櫛榛入比鼻焉能上煙説悅復去易去蜂蜂蠆叉又丑邁反縣玄也已下以陳陳殱尖重去隘挨去勍檠耉苟儳土減土咸二反芈彌上勞去柯哥縉晉馘肱入閾域别邊入二十三年緡音旻不與下預靖靜者與餘幾如字期期上如字下基從去聲委質如字辟闢已則上紀辟避難去校教從者上去牆墻咎皋隗五罪反鯈疇妻去盾豚上塊恢去又快妻之上去乘去醒上共恭駢薄賢反裸羅上薄博相去夫扶飱孫置止去詹占蕃煩從之如字又去儕柴過平辟避三舍下赦弭彌上屬燭櫜去鞬居言反惡之上去與預奉捧匜移盥管從去二十四年絏泄從君上去令狐上零荀逼逼見現女汝為去袪區難去射石鉤鈎相去豎樹藏去見現覆福守狩遽其據反妻去從亡上去已力上紀懟墜焉煙與女下汝蕃畨屏上郜告雍去酆丰郇荀昭如字邗干胙祚祭債召邵下同常如字鄂萼韡偉鬩馨入聾籠别邊入嚚銀施如字厭去又平婪力南反欿坎汜几好去鷸聿惡去衷忠又去已之上記稱去膰煩難去官守狩下同辟避鉏鋤二十五年阪反隧遂惡去攢鑽才官反呼去鄀若又楮斫弱隈煨傅附降平諜牒舍赦守狩鞮提飱孫從去餒內上二十六年犒靠竟境縣玄罄磬勞去縫逢道導鬻育摯至援院二十七年不共下恭復去貫官又如字飲去乘去施去縠一作榖同亟去説悅將去溱側巾犫袖共恭二十八年斂盂上亷又如字以説稅或如字下同凶上棺貫又官數所施示爇如悅反見現使去躍三百百音陌般班舍捨當去棼焚間去少上廣去宛鴛又如字施去説去説悅辟避舍赦背佩亢抗夭上愸銀去濮卜酅兮舍赦每每梅又去舍捨搏博伏已下紀盬古腦惱馮憑軾式與預寓遇為去乘去詰輕入朝昭韅顯去又靷寅去鞅央上靽半少去長上陳陳將去雍去鄉向傅付輅路玈盧卣酉又由賁奔要平隊墜攻平又去謂已下紀女汝也已下以奉已下紀從公去又如字守狩先期上去牂臧使去乘去歂遄華去射石枕去瞞謾平姦干茷伐馘國針鉗槖託饘旃獳奴侯反解皆上復服舍捨説悅三行下杭二十九年大雨下去雹弼角反見現復去好去三十年間去鴆直禁反為去玨角廑慬覲勤三音適的縋墜焉煙舍捨共供厭平説悅夫扶知智平與預歜在感反三十一年濟上重平共恭洮陶相去間間厠之間惡去三十二年軼迭又逸悖佩與預辟避三十三年乘去輕去以乘下去先去從去為去積漬餼希去為吾上去以間下間勞去朝條天奉俸施去其為下去衰催嬴盈厭去又平朝潮舍捨墮隳長張上鄉向復去過平鯀衮相去共恭先且下狙行杭朝潮覆福髠坤屯豚斂去鄶檜泜雉又上舍赦陳陳紓舒薄無音當音傳辟避祔付文公元年頵於倫反相去見現食似難難又如字悖佩訾資共恭更如字又庚蜂蜂豺柴芈敉呼去女汝蹯煩瞑冥又眠環如字又患要腰援院敗拜芮如鋭反隧遂覆福復去二年呼去瞫審乘去女汝難去共恭陳陳施去辟僻厭炎入為衛上去不先去下同鯀衮契屑窋知律反解懈不知下智為去好去三年沈審雨去螽終不解下懈隊墜樂洛嘉樂上假下洛四年壞怪邧阮又元為之上去度鐸肆移去朝條正政樂洛湛談上愾許計反玈盧貺況五年舍去賵鳳鄀若又直略反蓼了陶遙援院嬴盈沈漸書作沉潛難去六年射姑上亦又如字不告月如字讀為朔者非舍二上捨辟闢汙烏他鮀任壬子車下居仲行下杭針鈐又朱升為去分去豫與道導遺去復去焉煙少去難去長張上好去杼舒上又余上子樂嶽又洛辟闢逼逼姞其吉反隗五罪反而已下紀郫皮臾羊朱反駢便平帑奴知也上智竟境為民如字七年須句其俱反郚吾間去或如字難去矔貫華化御禦去上廕蔭舍捨適的焉煙屬燭堇謹又公靳反先人上去蓐辱刳枯之使下去為去焉用煙酆風戴已下紀則為去舍之上捨復去不樂洛説悅八年雒去解蟹復去竟境復之上服蒯快九年共恭少去茷吠禭遂十年女栗上汝又如字少去徴如字又懲又上矞聿強上縣玄王使下去泝訴須王上致勞去道導燧遂抶秩麇君十一年鹹咸來見下現鄋搜又騷瞞平乘去僑喬摏舂胹而夫鍾上扶十二年鄆運又鄖邽窪重之上去腆田上僥澆要平藉去令狐上零惡去輕去交綏鄭追車為綏憖魚刃反薄博十三年蘧渠蒢除棐芳味反詹占塞去難去行杭智智帑奴夫扶背佩繞繞朝如字又凋譟噪還旋繹亦必與下預遷千十四年孛佩又勃單善頃傾妃配施弛貸待又忒貜攫又俱碧反且沮長張上復服守狩麋君已氏紀又祀難灘告難下去焉煙十五年華孫上化為去從之上去共恭聲已紀毋絶上無説悅逺去句勾鼆萌上與預還旋難去已則上紀女汝相畏去又如字十六年郪西又妻杵追上臼求上君間如字訾子思麇君濮卜選如字又去阪反句勾澨筮復服克或作擊蚡粉陘刑隰習北如字又佩禆皮鯈紬乘平馹日鮑上不數下朔豔艷矔貫子朝如字紓舒難去甸奠十七年難去復去與預蕆敕展再見下現幾紀音與蔭同鋌挺為去質致歜觸邥審十八年罃鶯邴丙歜觸勝去掘其月反乘去撲波入抶姪女汝舍赦長張上屬燭見現聽去復去他駝竟境隊墜養去鸇旃度鐸食似還旋隤頽呆外平又嵬又瑰檮桃戭衍尨厖降杭愷凱貍釐好去嚚銀比鼻渾上敦徒本反少去皥浩譛曽去舍赦檮桃杌兀去上縉晉叨叨餮徹魑螭魅媚相去數所幾機宣公元年為立上去共恭解蟹二年馘國輅五嫁食士上似與預牂臧植值睅環上皤婆腹服思腮又如字復去來犁又如字乘去那乃多夫扶惡去難去斂去彈平辟避胹而蹯煩畚本朝潮留留去鉏鋤麑又迷盛成朝潮槐懷又梅飲去提本作祇上支反嗾叟夫扶獒翺搏博舍赦食似舍其上捨遺去槖託而與下預復服為法上去臀屯麗離適的公行下杭旄毛三年準宏郔延雒洛勞去底旨郟夾鄏辱姞其乙反與已下紀鯈紬徴貞媯九危反葉攝惡去蕃煩亢抗刈乂四年剡談向尚黿元見現及食下似告去畜嗅長張上舍赦畜朂難去般班惡去嬴盈轑遼質致漳章澨筮滸虎棼焚射石汏太輈晝平跗孚著直略反轂谷鄖云自為下去六年貫慣殪翳召邵廖聊間去七年與預向尚相去八年復服諜牒辟避九年易去衷中又去衵一又日朝潮泄泄冶也聞如字又問令去多辟下僻辟闢十年杼除上守臣上狩使去女汝射石斫竹角十一年櫕才丹反函咸櫟厯焉煙度鐸為陳上去少西上去轘患使去女汝蹊兮復去僥僥十二年邲必又弼臨去陴脾復去袒但好去僥澆泯民上能下去幾冀尫汪質致縠如字又谷