非糧良楨真供恭芻初茭交秦誓帥率崤爻譁華邁埋去番波仡欣入又音訖諞辨駢褊三音易亦介界又音个猗依上陸亦音伊若已音紀好去啻詩去冒貎惡之上去杌兀隉言入周易上經乾亨幸平潛㨗平見龍現下同惕汀入厲利咎求上躍藥亢抗彖湍去施去下同乗平健䖍上强平反復下音福造去長張上幹干去易亦遯鈍悶門去樂洛確苦學拔排入庸行下音去邪斜幾平恒胡登離去燥繰上又去聲時舍伊川音去粹隋去為行去聲下同未見下音現辨去聲又上聲重平下同夫扶先去後去喪去坤牝頻上攸由喪去凝魚氷馴旬知光上音智括官入譽余又去聲殃央弑試辨卞蕃煩暢帳為去嫌胡兼離去夫扶屯張論難去下同磐盤桓完下去邅旃乗馬去又音成媾勾去乗剛上音平聲幾平如舍赦又音捨施去漣連䝉夢平筮逝告谷再三去又平瀆獨果行下音去聲用說脱又音棁桎質梏谷取去逺去需須陷咸去雲上下上聲樂洛恒胡登難去衍延上訟窒珍入惕汀入逋布上眚生上竄七亂掇端入復服渝余鞶盤朝昭三去下同褫池上師畜蓄又音朂否臧鄙又浮上錫昔長張上比鼻下同應去缶浮上它他舍捨小畜畜蓄施去復服說脱輻福去上攣戀平處上幾祈又音平聲履咥迭說悅疚救眇妙小跛波上不當去聲下同愬生入又音喚入泰長張上相去左佐拔排入茹去彚胃又幃馮萍遺平陂秘復伏翩篇祉恥下同隍皇否皮上下同長張上辟必難去當去下同繫係苞包長也如字同人莾忙上乗平墉容號平咷桃大有用亨程音作亨通之亨諸家並音享彭子夏作旁程同晳祈又之世切易去謙濟去上上惡去好去踰余裒掊稱去施去撝揮豫忒慝盱吁當去盍胡臘簪側林乗平渝俞隨而下去聲説悅嚮向舍捨隕云上用亨如字又享蠱古先甲上音去臨長張上說悅思去當去知智觀貫下又大觀盥上觀童觀闚觀幾觀字並同餘十二觀字音觀盥管顒魚容省星上闚窺噬嗑噬筮嗑合頥移上行上聲不當去聲下同屨句校効又音教趾止鼻彼去腊昔乾干胏宰何上又伺賁秘剛上下上聲舍捨乗平濡儒皤婆又槃煩波三音翰寒去媾勾去當去戔殘又音賤剥邦入長張上蔑滅辨徐音辨胡安定音卞貫如字復伏復福長張上省星上祗程音紙抵也玉篇滴也義同陸音支无妄妄望眚生上穫皇入菑緇畬余繫係大畜畜蓄行去利己以又音紀說脫輻福牿告豶焚何荷賀頥怡舍捨悖佩耽下南上施去聲大過棟東去橈閙說悅藉去稊題華如字又音花習坎重平洊千去徳行去聲窞貪上枕去又沈簋鬼缶浮上祗支徽揮纆墨寘之去離畜凶入麗利重平錯倉入辟必昃仄耋迭突豚入涕弟沱佗離王上音利下經咸取娶下同説悦下女去聲拇謀上腓肥股古處上憧充脢音每又音梅頰莢說如字又脱又稅恒胡登已以易亦浚旬去遯豚去當去長上逺去惡入勝如字又音升說如字又脱又税憊敗好去否音鄙又浮上聲大壯趾止羝低觸充入藩蕃羸縲決穴輻福喪去易去當去長如字晉蕃煩三去下三褫同摧徂回上行上上鼫石當去明夷難去莅利拯征上家人行去恒胡登饋匱嗃各嘻嘻竝音熙假格又上聲睽若圭說悦下同喪去復服辟避曳伊去掣昌折劓宜去當去噬筮弧乎媾勾去蹇堅上難去知智當去連上聲又如字解蟹坼䇿解蟹乗平解而皆上聲拇牡有解音蟹射石隼筍以解皆上聲墉容悖佩損簋鬼應去懲澄忿分去窒珍入已事上以又紀遄船益説悦下下上去下上施去用享如字又亨夬乖去號去説悦乗平長張上施去不勝去聲惕逷號平莫暮頄逵又音求濡如臀豚次且上咨下徂當去莧限又音現號平姤勾去取娶下同柅尼上羸縲蹢呈入躅逐包庖程音苞下同次且上咨下徂臀屯逺去隕云上舍捨萃瘁假下下同説悦若號去又平握渥禴藥當去齎躋涕體洟夷升禴音約虛如字又音墟用亨如字又享岐其困說音悅臀豚株誅覿迪紱弗蒺疾䔧梨乗平劓刈刖月説悦藟累上臲言入卼兀又音月井喪去聲汔掀入繘橘羸縲上上勞去相去泥去舍捨谷穀又音射石又如字又亦鮒附甕屋送切又雍敝弊渫先入為去下同惻測甃鄒去冽列收去又平幕莫革説悦當去鞏拱行如字又去蔚尉又欎鼎亨烹下同飪衽又去上行上上趾止出尺述否鄙悖佩其行去聲塞僧入折旃入覆福餗速渥握鉉𤣥上震虩奥入啞烏客喪去下同匕比鬯悵洊千去省星上躋子西乗平𤯝生上當去泥去聲又如字索桑入矍攫艮坤去背音貝趾止應平腓肥拯征上限閑上夤寅又音𦙍輔上漸磐盤衎刋去復服孕盈去離去桷角勝去陸程引胡音逵歸妹妹昧説悦當去乗平娣弟跛波上眇彌小遲持又帶袂寐幾機祈二音刲睽豐烘假格又賈昃仄蔀剖又部沛佩沬昧肱觥當去闚窺闃傾入旅陸𤨏悉果喪去下同處上射石號平咷桃易去巽孫去重平頻平先庚上音去聲喪去兌隊說悦先去又平難去當去渙奐假格又賈乗平拯征上杌兀號去去上逖狄逺去節接説悦當去數去度法度行去中孚豚屯説悦乗平它他和平靡本作糜木弛切罷排上又音皮幾平聲又祈又既攣劣平翰汗小過遺如字宜上下上宜下下去以行去喪平妣比戕墻當去長也上張上弋翌上上眚生上既濟當去曳以制濡如喪去茀弗憊敗繻如又一音須袽如平禴藥未濟汔欣入濟去當去暉輝繫辭上斷端去見現摩磨盪唐上以易去章内同樂洛疵慈險易下音異凖諄上彌如字綸倫説如字知周上音智樂洛知者上音智之知下音智鮮矣上音上聲夫易扶夫乾夫坤夫易同易簡上音異知崇上音智賾生入以斷下音叚惡也上音去和之上音去靡迷行去見現行去機基號平咷桃處上斷叚又去音短藉在夜切下同錯措夫扶重上幾事上平聲且乗如字讀作剩字者非是下同藏去冶也衍延數去掛卦揲時設奇基扐勒期基觸充入長之上張上行去酬讎酢昨與預下同參七南錯倉入綜宗去研妍幾平夫扶下同斷煆蓍尸知去易去洗先上知去與預叡位知智殺所戒者夫下音扶齊齋闔合闢平入見現縣平探貪賾生入索生入鉤勾亹尾見現斷煆下同緼云上幾平錯措行去繫辭下重之上音平趣娶觀貫夫扶下同確康入易去隤頽見現包犧庖讀苞非王旺罟古佃田斵琢耜似揉柔上耒雷去刳枯剡炎上耨乃豆楫接乗平重上重平析托斷短杵樞上掘其月臼咎弧胡剡炎上處上衣去喪平棺官槨郭竒基耦偶行去憧充信伸下同蠖汪入蟄直立蒺疾藜梨邪耶射石下同隼筍墉容懲澄屨句校效趾止去上揜掩解皆上何上又平知小上去少上重上鮮上覆福餗速渥握勝升幾平瀆讀見現俟士斷煆覆復復伏祗之絪因緼愠醇淳易異邪耶撰般上於稽上如字下基夫易扶亦闡曷善當去斷煆中去行去厭去後易下去長上稱去又平行去遠害上去要終平下同易去夫扶噫伊知去思去要去勝去當去易去要去夫扶下同行去易去說悦與愈預非惡去慙慚躁遭去説卦蓍尸參七南又三數去射石數往上上逆數上又去烜喧上以說上齊如字橈嘵上燥掃去熯漢逮代悖佩索生入長上中去下同少去下同圜圎瘠駁剥嗇色旉孚筤郎萑完馵注顙桑上蕃煩鮮仙輮柔脊迹亟棘中去乾卦音干又榦讀䖍者非蟹户賣蠃縲蚌棒槁考蓏力火閽昏寺如字黔鉗鹵魯序卦稺持去比備畜充入否皮上觀去賁秘可觀平下同錯措難去說悦雜卦樂洛觀平見現飭敕觧蟹難去去上處上長上畧例明彖夫扶下同璇全璣基輻福湊七奏思去逺于萬渝俞賾七積與預明爻通變好去量去朝上廷亭比備遟壑杭入說悦惡去同下與預明卦適變通爻斷煆要平辟避比備好呼報明象筌七全應平漫末半辨位位分扶問下同去初上上略例下率類又律所律切比備行去去六上聲卦畧屯難去馮皮氷四逺袁萬切觀明夷卦同長張上以近附近明夷卦之近内同難在刀亘切下同明本排字九經直音卷上
