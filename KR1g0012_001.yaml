  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1g0012_WYG_001-1a, image: WYG0184/WYG0184-0126a.png}
body:
  text: 明本排字九經直音卷上孝經序行去三復上去下覆景行舊音去聲景行字祖出毛詩朱氏曰景行大道也則行作平聲此序以景訓明行訓踐言明踐聖訓亦當作平聲幾機泯民上煨烏回反燼辛去濫䌫糟遭粕傍入五傳下去逾俞别如字踳春上駁剥殆待逞軌鬼轍徹當去翦剪翻番炫縣趣趍去行去琬宛琰炎上開宗明義章復服又去夫孝上扶語去膚孚聿尹吉反天子章惡去盡津忍反兆趙諸侯章度渡溢逸兢矜卿大夫章德行下去擇行下去行滿上去怨惡下去懈諧去士章事長下上忝上庶人章養去三才章夫扶行去下同好惡並去赫火百反尹允瞻占孝治章侮武鰥闗夫然上扶行去聖治章行去夫扶膝辛入養去續俗重上悖蒲去行思上去樂洛可度下渡令去淑熟忒慝紀孝行章行去養去樂洛䘮桑不争下平之養下去五刑章屬蜀要平廣要道章樂岳廣至德章愷開上悌上廣揚名章長張上行去諫争章争去下同若夫下扶令去言與下餘離去又焉於䖍反感應章長張上慎行下去事君章盡津上遐霞䘮親章䘮桑去偯扆聞樂不樂上岳下洛慼戚棺官槨郭衾欽簠甫簋鬼擗闢踊勇兆上措粗去論語序壘累校效傳付夏上勝去相去韋去傳之上平琅郎邪耶膠交共王上恭壊怪為之如字解悈上傳平太守下狩融肜頗坡上為去邕雍沖䖝又充羲熈顗擬尚平駙附學而説悦樂洛愠紆問反弟去而好下去下同鮮仙上本與下予令去鮮仙上三去又如字省星上為去傳平道導乗去弟子上上則弟下去汎凡去行平子夏上後並同易亦重去如已下紀憚檀去之與下予下同其行下去近去復覆逺去好學上去也已下以諂丑琰樂洛好去磋七多琢卓磨眉波謂與下平不已下紀為政譬匹智共拱蔽卑去邪斜道導下同從心朱如字踰余懿衣去樊煩養去下有養同别彼列食似饌船去又傳去曽増省星上焉煙廋搜比皮去殆待也已下以女汝慎行下平行寡上去錯措為為並如字車居輗倪軏月夏上八佾佾逸相去辟壁放方上易去亡無女汝與予曽増争如字飲去倩千去盼普莧絢呼懸繪㑹已矣上以杞起徴貞禘弟灌貫不與下預賈加上媚眉去奥烏報竈遭去禱倒監鑑郁於入鄹鄒為力如字又去去上告谷餼希去盡親上又津上雎七余樂洛攝失渉焉煙好去坫玷語去翕吸從之上縱純淳皦皎繹亦請見下去得見下如字從者上去見之上現䘮去鐸達各韶紹平盡津上里仁處樞上焉煙知智處上下同樂洛智智好去能惡下去無惡下入所惡下去不去下上去仁上去惡乎上烏造去沛貝好去惡不上去朝昭適的莫如字比皮去放上莫已下紀參三唯為上省星上幾機鮮上訥嫩入行去數朔䟽踈公冶長冶也妻去下同縲力追絏泄戮六斯焉下煙女汝瑚胡璉連上焉用煙下同佞寕去禦語給急憎增漆七雕凋子說下悦乗平桴孚從去與余好勇上去千乗下去下同朝潮女汝愈與與女下汝宰予下余晝周去寢侵上朽休去糞分去杇烏與余下同行去棖直庚慾欲焉煙好去蔡菜藻早梲拙其知下去令去三已下以愠殷去未知如字又去焉煙崔催乗去三思上去又平寗寜去則知下智其知下智與予斐匪裁才惡入醯希令去足狙去又如字匿寕入盍合衣去憾含去少去訟頌者焉如字好去雍也而行如字乃大下泰亡如字使去為其上去釜父庾與秉丙乗平衣去裘求毋無犂梨騂息營舍捨也與下余藝魚祭騫愆費秘善為下去復服汶問牖酉夫扶簞丹食似瓢婢遥樂洛不說下悦下同女汝下同畫獲澹談殿顚去鮀沱宋朝下潮勝去彬賔好去樂洛以上上語去知智下同逺去樂水樂山並五孝反者樂下洛觚孤逝誓䧟咸去畔叛矣夫下扶不說下悦否浮上厭上又去鮮上施去夫仁上扶已紀譬皮去也已下以述而好去竊切識志又如字厭炎去誨囘去倦權去講江上徙西上燕宴夭平復浮去下同據句上上憤噴上悱匪倦權去䘮桑舍捨夫扶誰與如字下同馮慿好去下同鞭邊齊齋樂岳為衛不為並去飯上䟽踈食似肱國平枕去樂洛數所葉攝女汝憤分上樂洛好古上去桓完魋頽文行下去恒胡登亡朱音无釣吊綱剛弋亦射石識朱音志互乎去見現已紀取娶和去禱倒誄纍祗其孫去蕩上泰伯葸西上絞交上兢矜免夫下扶逺去下同近去校交去人與下予毅義重上已任上紀已以好去之已下以榖朱音谷不易下去好去見現摰至睢沮洋羊侗通去愿願倥空巍魚威蕩唐上不與下預煥喚無間下去菲匪惡入黻弗冕免溝勾洫兕入子罕毋並无䘮去下同與預者與下予縱去少去牢勞叩口已以夫扶齊咨衰催冕免少去喟葵去鑽纂平瞻占循旬誘有罷徘上也已下以病間去又平韞藴匵獨賈價沽孤䘮桑逝筮夫扶舍捨好去簣匱覆風入語去惰駝去與予夫扶焉煙也已下以語去巽遜與羽說悅繹亦帥衰去衣去下同緼藴袍抱平貉杭入也與下余忮至彫凋知智棣弟華花偏篇夫扶鄉黨恂荀又旬朝潮篇内同便卞平侃刋去誾銀踧足踖迹與與予又如字擯賔去躩攫襜覘復服鞠菊閾域攝齊下咨屏丙逞廳上怡移復服勝升上如上上蹜縮覿廸愉俞紺甘去緅鄒飾式䙝先入袗真上絺蚩綌隙緇菑麑宜袂彌去長去貉杭入去上䘮桑殺去齊齋食似厭去膾古外食似饐衣去餲烏賣餒内上不食如字色惡下入臭幽去惡入飪任去醬將去勝去食氣上似無量下諒脯甫䟽踈食似齊齋儺那阼作階皆饋匱廐救腥星必畜下朂飯上首去拖駝上紳申殯賔去齊咨衰摧狎狹冕免瞽皷版板饌撰去迅信綏雖顧故雉池上共平上去三去又平嗅休去先進從我上去蔡菜行去騫愆不說下悅間去三去又平復服妻去好去亡无槨郭鯉里棺官噫依䘮去慟洞從者上去夫扶之為下去誰為下去夫扶焉煙下同誾銀行杭去侃刋去樂洛夫人上扶中去下同愈與下余為之上去又平歛簾去參生辟僻喭岸又五旦反屢空控又平殖植億憶論去篤督與如字以女下汝臣與下余曾由上增者與下余弑試費秘夫扶惡去夫扶佞寕去晳昔長上毋无乗去攝蟾入饉僅比鼻朱音庇哂申上俟師去小相下去鏗坑撰摶上舍捨莫暮冠貫浴欲沂宜雩于喟虧去晳昔夫三上扶也與下予顔淵克己紀下同復服訒刃已乎上以省星上疚究去夫扶亡如字譛簪去膚孚愬素去上下同得已下以駟四鞟廓饑飢盍合惡之上去祇之也與下余諾囊入聽去訟頌夫扶之惡如字帥率焉用上煙夫扶好去夫扶行去樊煩從平又去雩于慝忒與余下同問知下智錯措枉往鄉向見現選去臯交陶遥逺上又去告谷道去毋無子路勞平又去焉煙舍捨迂于又於中去錯措稼架圃補好去下同夫扶襁姜上焉煙使去令去少上完桓期基已以勝升去上朝潮其與下預㡬平下同易去䘮去樂洛葉攝下同說悅莒舉父甫語去攘禳證正為去處上行已下紀使去弟悌下同行去硜坑噫依筲梢算去又上中行如字狷絹恒行又常醫伊夫扶好去惡去下同易去説悦下同毅宜去訥嫩入偲絲怡移憲問榖谷危行下去孫去适括羿詣奡傲盪湯去矣夫下扶勿勞下去禆皮諶忱創窻去論平飾式駢便平飯上䟽踈食如字又似易去綽昌入薛屑之知下智卞辨要去賈假厭去樂洛防房不要下平譎决糾九召邵者與下予相去被去衽上諒亮溝勾瀆讀僎上夫扶喪去下同圉語鮀沱賈假怍昨朝潮恒行又常告夫下扶者為下去蘧渠使去又上使者去下同其行下去知者上智夫扶己知上紀億亦畆牡栖西與予驥記稱平也夫下扶寮聊愬素朝潮與予辟避者與下予荷上蕢匱硜坑莫已下紀斯已下以厲例揭欺去諒亮隂諳薨昏總已下紀上好下去易去修已下紀下同而已下以壤而丈孫去弟悌長上叩口脛刑去者與下余衛靈公陳去爼莊吕糧良從去愠殷去見現女汝識志者與下余下同鮮上治去夫扶恭己下紀問行如字行去貊陌參所金反朱七南倚以夫扶後行如字紳申蘧渠巻捲知智乗平輅路冕免樂岳放去鄭定逺去佞寕去殆待已矣上以好去者與下余則逺下好去慧惠孫去不已紀下同譽余下同乗平亡如字夫扶惡去好去餒内上知及上智涖利小知如字蹈盗貞徴諒亮為謀上上又去見現階皆某牡道與下余相去季氏顓專臾余見於上現與予夫扶任平焉煙相去兕似柙匣櫝獨過與下余今夫下扶費秘疾夫下扶舍上夫扶相去離平析昔陪培故夫下扶諒亮便平下同辟僻三樂咬去禮樂下岳驕樂宴樂並洛愆騫躁遭去瞽古少去鬭兜去狎匣侮武忿分去難去探貪駟四謂與下予亢剛又抗鯉里逺去稱平又去陽貨欲見如字朱音現歸饋又如字豚屯塗徒好去亟欺去知去下同莞還上焉煙易去戯希去擾遶費秘畔叛說悅已以夫扶侮武任去佛弼肸許密牟謀磷吝湼年入緇菑匏庖焉煙繫係蔽庇語去好去同下絞狡學夫下扶興去又平觀平邇尔召邵也與下余荏任上窬俞也與下余鄉如字原元塗徒說如字與余亡无戾利令去鮮上惡去下同覆服欲見如字又現之喪下桑期基已久上以鑽贊燧遂期可上基夫扶下同稻桃去衣去食㫖如字不樂下洛處上女汝夫扶弈亦已以有惡去下同惡者上入訕山去窒珍入徼澆知者上智孫遜下同訐厥逺去見惡下去已以微子箕基三去又平黜敕律焉煙枉往歸饋樂岳朝潮輿余已而上以辟避沮狙溺寕入耦偶夫扶為誰上平下同丘與下余徒與下余滔叨易之上亦與其上宇下同辟去下同耰憂輟專入憮武徒與誰與朱如字從而上去荷上又平蓧條去不分下平植值又殖芸云拱上食之上似見其上現見之上如字長張上已知上紀又以少去下同與予又宇中終去下同行去摰至飯反繚了鼗桃施如字适括突屯入騧烏𤓰子張焉煙亡無拒巨賢與下予下同泥去亡无好去儼嚴上已也上紀謗博去踰余洒上又去掃去應去噫依傳平别編入焉煙誣无卒遵入優幽喪桑下同膚孚散去紂疇去子惡下去之惡如字更庚朝潮焉學上煙墜槌去識如字又志焉不上煙語去朝潮肩堅闚窺之好如字仞刃毁婢上踰余量亮知智下同階皆道去綏雖堯曰厯力履離上赦奢上蔽卑去賚来去量亮重上喪桑說恱屏丙惡如字費非去勞如字下同又焉煙慢蠻去令去出如字内納吝林去孟子題辭稱平鄒側鳩軻柯邾株并兵去喪去下同淑熟長張上縱蹤隳許規翟狄蕩上悼導湮因壅擁底抵馳池騁逞枉往迂于又於闊寛入聽去姬基值持去奮分去信伸詒貽論去難去揆葵上叙序厲例蹈導操去抗康去倨去删山繫係疇籌錧管鎋轄喉侯衿今陳陣爼阻桓完魋頽鬲隔焉煙放上絀出逮代戮六泯敏能傳去下同譬匹智廹百已以摭隻載上祚徂去少去嬰因溝勾屯埻蹇堅上詭歸上紘宏勦焦上瘵債肩堅弛豕擔都濫岱代劬渠瘁悴睠眷論去稽雞漂飄思去閎宏緼藴已紀傳去别邊入寤悟梁惠王上見梁現下同叟藪乗去饜平又去麋眉樂洛下同亟急囿又麀幽濯濁鶴詩作翯户角反於如字又音烏牣刃害曷喪去女汝少上好去填田曳衣去直如字又音值勝升下同數促罟古洿烏喪桑畆牡衣去彘治畜凶入數上又去庠詳頒班王去檢兼上塗徒餓俄去莩飄上刺七梃廷上庖匏廐䆒惡去惡在上烏俑勇為去强如字長子張上喪去比去洒洗省生上斂去易去耨奴豆長張上梃廷上撻灘入養去陷咸去溺寕入夫扶語去卒村入惡乎上烏嗜詩去夫扶槁考浡勃今夫下扶牧木就下下去齕核釁欣去舍捨觳斛觫速鐘與下余易亦褊邊上惡烏逺去庖匏厨除說悅忖村上度入夫我上扶復服鈞均羽上何與下余為不上去不為下平挾叶語人上去為去長張上何與下余度渡下度之入聲構勾去心與下余聞與下余曰為去下抑為豈為不為並去聲口與下予並同便平嬖臂令平供恭知己下以辟闢朝潮莅利殆待勝去彊强